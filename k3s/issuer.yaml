apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: grayfalcon666@gmail.com # 证书过期前会发邮件提醒
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - dns01:
        cloudflare:
          email: grayfalcon666@gmail.com
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token