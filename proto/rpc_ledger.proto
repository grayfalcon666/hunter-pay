syntax = "proto3";

package pb;
import "google/protobuf/timestamp.proto";

option go_package = "simplebank/pb";

message LedgerEntry {
    string id = 1;
    int64 account_id = 2;
    int64 bounty_id = 3;
    string event_type = 4;
    int64 amount = 5;
    string counterparty = 6;
    string description = 7;
    google.protobuf.Timestamp created_at = 8;
}

message CreateLedgerEntryRequest {
    int64 account_id = 1;
    int64 bounty_id = 2;
    string event_type = 3;
    int64 amount = 4;
    string counterparty = 5;
    string description = 6;
}

message CreateLedgerEntryResponse {
    LedgerEntry entry = 1;
}

message ListAccountLedgerRequest {
    int64 account_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ListAccountLedgerResponse {
    repeated LedgerEntry ledger_entries = 1;
    int64 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}
