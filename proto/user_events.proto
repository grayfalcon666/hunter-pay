syntax = "proto3";

package pb;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/grayfalcon666/user-profile-service/pb";

// 用户创建事件
message UserCreatedEvent {
    string username = 1;
    string email = 2;
    string full_name = 3;
    string request_id = 4; // 幂等键
    google.protobuf.Timestamp created_at = 5;
}

// 用户资料创建事件
message ProfileCreatedEvent {
    string username = 1;
    string request_id = 2;
    bool success = 3;
    string error_message = 4;
}

// 账户创建事件
message AccountCreatedEvent {
    string username = 1;
    int64 account_id = 2;
    string request_id = 3;
    bool success = 4;
    string error_message = 5;
}

// 用户初始化完成事件
message UserInitializationCompletedEvent {
    string username = 1;
    string request_id = 2;
    string status = 3; // INITIALIZED, FAILED, PARTIALLY_INITIALIZED
}
